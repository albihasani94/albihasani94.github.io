version: 2

updates:
  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: monthly
    versioning-strategy: increase-if-necessary
    open-pull-requests-limit: 5
    groups:
      jekyll-dependencies:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      workflow-actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
