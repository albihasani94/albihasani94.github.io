<svg xmlns="http://www.w3.org/2000/svg"
  width="1200"
  height="630"
  viewBox="0 0 1200 630"
  role="img"
  aria-labelledby="title description">
  <!-- Replace only {{POST_TITLE}} and {{POST_DESCRIPTION}} for each post. -->
  <title id="title">{{POST_TITLE}}</title>
  <desc id="description">{{POST_DESCRIPTION}}</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12182f"/>
      <stop offset="1" stop-color="#10162c"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffc13b"/>
      <stop offset="1" stop-color="#ffa426"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path
        d="M 44 0 L 0 0 0 44"
        fill="none"
        stroke="#8290b6"
        stroke-opacity=".1"
        stroke-width="1"/>
    </pattern>
    <style>
      .post-copy {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .post-title {
        color: #f5f1e8;
        font-size: 84px;
        font-weight: 800;
        letter-spacing: -2px;
        line-height: .98;
      }

      .post-description {
        color: #9ca9c9;
        font-size: 30px;
        font-weight: 500;
        line-height: 1.4;
        margin-top: 30px;
      }

      .site-name,
      .site-topics {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#background)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="1058" cy="22" r="278" fill="#27325e" fill-opacity=".8"/>
  <circle cx="930" cy="630" r="230" fill="#222c56" fill-opacity=".72"/>
  <rect x="64" y="72" width="10" height="486" rx="5" fill="url(#rail)"/>

  <foreignObject x="112" y="175" width="780" height="290">
    <div xmlns="http://www.w3.org/1999/xhtml" class="post-copy">
      <div class="post-title">{{POST_TITLE}}</div>
      <div class="post-description">{{POST_DESCRIPTION}}</div>
    </div>
  </foreignObject>

  <text class="site-name"
    x="112"
    y="551"
    fill="#ffc13b"
    font-size="24"
    font-weight="800"
    letter-spacing="2">ALBINHASANI.NET</text>
  <text class="site-topics"
    x="380"
    y="551"
    fill="#9ca9c9"
    font-size="22"
    font-weight="500">Java · JVM · Cloud · AI</text>
</svg>
